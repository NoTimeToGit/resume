<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>John Phillip Baker — Resume</title>
<style>
  :root {
    --ink:      #1a1a2e;
    --mid:      #4a4a6a;
    --muted:    #8888aa;
    --rule:     #dddde8;
    --accent:   #b5893a;
    --bg:       #faf9f7;
    --card:     #ffffff;
    --open-bg:  #f5f3ef;
    --serif:    Georgia, 'Times New Roman', serif;
    --sans:     'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.6; }
  .resume { max-width: 760px; margin: 0 auto; padding: 40px 24px 60px; }
  .header { border-bottom: 2px solid var(--ink); padding-bottom: 20px; margin-bottom: 32px; }
  .header-name { font-family: var(--serif); font-size: 2.4rem; font-weight: 600; letter-spacing: 0.02em; color: var(--ink); line-height: 1.1; }
  .header-tagline { font-size: 0.78rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .header-meta { display: flex; flex-wrap: wrap; gap: 6px 24px; margin-top: 14px; font-size: 0.84rem; color: var(--mid); }
  .header-meta span::before { content: attr(data-icon); margin-right: 5px; color: var(--accent); }
  .section { margin-bottom: 8px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; background: var(--card); border: 1px solid var(--rule); border-radius: 4px; cursor: pointer; user-select: none; transition: background 0.15s, border-color 0.15s; }
  .section-header:hover { background: #f0ede8; border-color: var(--accent); }
  .section-header.open { background: var(--open-bg); border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .section-title { font-family: var(--serif); font-size: 1rem; font-weight: 600; letter-spacing: 0.01em; color: var(--ink); }
  .section-chevron { font-size: 0.75rem; color: var(--accent); transition: transform 0.2s; }
  .section-header.open .section-chevron { transform: rotate(180deg); }
  .section-body { display: none; border: 1px solid var(--accent); border-top: none; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; background: var(--open-bg); padding: 4px 0 12px; }
  .section-body.open { display: block; }
  .entry { padding: 14px 20px; border-bottom: 1px solid var(--rule); }
  .entry:last-child { border-bottom: none; }
  .entry-top { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 4px; }
  .entry-title { font-weight: 700; font-size: 0.9rem; color: var(--ink); }
  .entry-dates { font-size: 0.78rem; color: var(--muted); font-weight: 300; white-space: nowrap; }
  .entry-sub { font-style: italic; font-size: 0.84rem; color: var(--mid); margin-top: 1px; }
  .entry-desc { margin-top: 6px; font-size: 0.86rem; color: var(--mid); line-height: 1.55; }
  .entry-desc ul { list-style: none; padding: 0; }
  .entry-desc ul li { padding-left: 14px; position: relative; margin-bottom: 2px; }
  .entry-desc ul li::before { content: '–'; position: absolute; left: 0; color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 20px; }
  .chip { background: var(--card); border: 1px solid var(--rule); border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; color: var(--mid); }
  .chip.featured { border-color: var(--accent); color: var(--ink); font-weight: 700; }
  .profile-blurb { padding: 16px 20px; font-size: 0.9rem; color: var(--mid); line-height: 1.65; font-family: var(--serif); font-style: italic; }
</style>
</head>

function renderHeader(data) {
  const metaHtml = data.contact.map(c => `<span data-icon="${c.icon}">${c.text}</span>`).join('');
  return `<div class="header"><div class="header-name">${data.name}</div><div class="header-tagline">${data.tagline}</div><div class="header-meta">${metaHtml}</div></div>`;
}

function renderEntries(entries) {
  return entries.map(e => {
    const bulletsHtml = e.bullets && e.bullets.length
      ? `<div class="entry-desc"><ul>${e.bullets.map(b => `<li>${b}</li>`).join('')}</ul></div>`
      : '';
    return `<div class="entry"><div class="entry-top"><span class="entry-title">${e.title}</span><span class="entry-dates">${e.dates || ''}</span></div><div class="entry-sub">${e.org || ''}</div>${bulletsHtml}</div>`;
  }).join('');
}

function renderChips(chips) {
  return `<div class="chips">${chips.map(c => `<span class="chip${c.featured ? ' featured' : ''}">${c.text}</span>`).join('')}</div>`;
}

function renderSection(sec) {
  let bodyInner = '';
  if (sec.type === 'blurb')   bodyInner = `<div class="profile-blurb">${sec.content}</div>`;
  if (sec.type === 'entries') bodyInner = renderEntries(sec.entries);
  if (sec.type === 'chips')   bodyInner = renderChips(sec.chips);
  return `<div class="section"><div class="section-header" data-target="${sec.id}"><span class="section-title">${sec.title}</span><span class="section-chevron">▼</span></div><div class="section-body" id="${sec.id}">${bodyInner}</div></div>`;
}

function renderResume() {
  const root = document.getElementById('resume-root');
  root.innerHTML = renderHeader(RESUME_DATA) + RESUME_DATA.sections.map(renderSection).join('');
  document.querySelectorAll('.section-header').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = document.getElementById(btn.dataset.target);
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      btn.classList.toggle('open', !isOpen);
    });
  });
  const exp = document.getElementById('experience');
  const expBtn = document.querySelector('[data-target="experience"]');
  if (exp && expBtn) { exp.classList.add('open'); expBtn.classList.add('open'); }
}

renderResume();
